name: validate
on:
  push:
  pull_request:
jobs:
  validate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Regenerate summaries and charts
        run: python scripts/generate_summary_and_charts.py
      - name: Validate JSON files
        run: |
          python -m json.tool configs/tested-profiles.json >/dev/null
          python -m json.tool results/max-accuracy-v1/summary.json >/dev/null
